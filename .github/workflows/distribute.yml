name: Publish Package to PyPI and GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Library version tag to publish (e.g., 24.11.30.0)'
        required: true
        default: ''

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Determine Target Tag
        id: target
        env:
          INPUT_TAG: ${{ github.event.inputs.version_tag }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$INPUT_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository at specific tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.tag }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package distributions
        run: uv build

      # === 1. ПУБЛИКАЦИЯ В GITHUB PACKAGES ===
      - name: Publish to GitHub Packages
        run: |
          echo "Configuring uv for GitHub Packages..."
          # Официальный рабочий эндпоинт GitHub Packages для Python/PyPI пакетов
          export UV_PUBLISH_URL="https://maven.pkg.github.com/${{ github.repository }}"
          
          # Публикуем артефакты, авторизуясь через системный токен
          uv publish --username "${{ github.actor }}" --password "${{ secrets.GITHUB_TOKEN }}"

      # === 2. ПУБЛИКАЦИЯ В ОФИЦИАЛЬНЫЙ PYPI ===
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1